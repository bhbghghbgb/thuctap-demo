<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="100" cy="50" r="25" fill="#ffdbac" stroke="#333" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="92" cy="45" r="3" fill="#333"/>
  <circle cx="108" cy="45" r="3" fill="#333"/>
  
  <!-- Mouth -->
  <path d="M 92 55 Q 100 60 108 55" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Neck -->
  <rect x="95" y="73" width="10" height="12" fill="#ffdbac" stroke="#333" stroke-width="1"/>
  
  <!-- Body/Chest -->
  <ellipse cx="100" cy="130" rx="35" ry="45" fill="#4a90e2" stroke="#333" stroke-width="2"/>
  
  <!-- Arms -->
  <ellipse cx="65" cy="110" rx="15" ry="40" fill="#ffdbac" stroke="#333" stroke-width="2"/>
  <ellipse cx="135" cy="110" rx="15" ry="40" fill="#ffdbac" stroke="#333" stroke-width="2"/>
  
  <!-- Hands -->
  <circle cx="60" cy="153" r="10" fill="#ffdbac" stroke="#333" stroke-width="1.5"/>
  <circle cx="140" cy="153" r="10" fill="#ffdbac" stroke="#333" stroke-width="1.5"/>
  
  <!-- Legs -->
  <rect x="85" y="170" width="12" height="80" fill="#785a3a" stroke="#333" stroke-width="2"/>
  <rect x="103" y="170" width="12" height="80" fill="#785a3a" stroke="#333" stroke-width="2"/>
  
  <!-- Feet -->
  <ellipse cx="91" cy="255" rx="12" ry="8" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="109" cy="255" rx="12" ry="8" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  
  <!-- Label indicators (light dots) -->
  <circle cx="100" cy="50" r="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="130" r="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <circle cx="65" cy="110" r="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <circle cx="135" cy="110" r="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <circle cx="91" cy="190" r="2" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
</svg>