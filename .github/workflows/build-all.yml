name: Build Templates and Multiple Electron Apps

on:
  # push:
  #   branches: ["main"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual build"
        required: false
        default: "Manual trigger"
      build_windows:
        description: "Build Windows App?"
        type: boolean
        default: false
      build_macos:
        description: "Build macOS App?"
        type: boolean
        default: false

jobs:
  # --- JOB 1: Build on Linux (primary build) ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      # Step 1: Build all game templates using build-templates.sh
      - name: Get yarn cache directory path (templates)
        id: yarn-cache-dir-path-templates
        shell: bash
        working-directory: template-projects
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies (templates)
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path-templates.outputs.dir }}
          key: ${{ runner.os }}-yarn-templates-${{ hashFiles('template-projects/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-templates-

      - name: Build all templates using build-templates.sh
        run: ./build-templates.sh

      # Step 2: Upload each game template as separate artifact
      - name: Upload template artifacts
        uses: actions/upload-artifact@v4
        with:
          name: templates-all
          path: builder-projects/electron-app-mui/templates/
          retention-days: 1

      # Step 3: Build the builder app with 7z target
      - name: Get yarn cache directory path (builder)
        id: yarn-cache-dir-path-builder
        shell: bash
        working-directory: builder-projects/electron-app-mui
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies (builder)
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path-builder.outputs.dir }}
          key: ${{ runner.os }}-yarn-builder-${{ hashFiles('builder-projects/electron-app-mui/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-builder-

      - name: Install dependencies (builder)
        working-directory: builder-projects/electron-app-mui
        run: yarn install --immutable

      - name: Build electron app (Linux - 7z)
        working-directory: builder-projects/electron-app-mui
        shell: bash
        run: |
          # Build with electron-vite build
          yarn electron-vite build
          # We remove --dir to let it actually compress the archive
          yarn electron-builder --linux -c.linux.target=7z

      - name: Upload Linux builder artifact
        uses: actions/upload-artifact@v4
        with:
          name: builder-linux-7z
          # electron-builder names the output based on your package.json name
          path: builder-projects/electron-app-mui/dist/*.7z
          retention-days: 30

  # --- JOB 2: Build on Windows (download templates, build builder) ---
  build-windows:
    runs-on: windows-latest
    needs: build-linux
    if: ${{ inputs.build_windows == true }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      # Download pre-built templates from Job 1
      - name: Download templates artifact
        uses: actions/download-artifact@v4
        with:
          name: templates-all
          path: builder-projects/electron-app-mui/templates/

      - name: Get yarn cache directory path (builder)
        id: yarn-cache-dir-path-builder
        shell: bash
        working-directory: builder-projects/electron-app-mui
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies (builder)
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path-builder.outputs.dir }}
          key: ${{ runner.os }}-yarn-builder-${{ hashFiles('builder-projects/electron-app-mui/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-builder-

      - name: Install dependencies (builder)
        working-directory: builder-projects/electron-app-mui
        run: yarn install --immutable

      - name: Build electron app (Windows - 7z)
        working-directory: builder-projects/electron-app-mui
        shell: bash
        run: |
          # Build with electron-vite build
          yarn electron-vite build
          # We remove --dir to let it actually compress the archive
          yarn electron-builder --win -c.win.target=7z

      - name: Upload Windows builder artifact
        uses: actions/upload-artifact@v4
        with:
          name: builder-windows-7z
          # electron-builder names the output based on your package.json name
          path: builder-projects/electron-app-mui/dist/*.7z
          retention-days: 30

  # --- JOB 3: Build on macOS (download templates, build builder) ---
  build-macos:
    runs-on: macos-latest
    needs: build-linux
    if: ${{ inputs.build_macos == true }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn 4
        run: corepack enable && corepack prepare yarn@4.13.0 --activate

      # Download pre-built templates from Job 1
      - name: Download templates artifact
        uses: actions/download-artifact@v4
        with:
          name: templates-all
          path: builder-projects/electron-app-mui/templates/

      - name: Get yarn cache directory path (builder)
        id: yarn-cache-dir-path-builder
        shell: bash
        working-directory: builder-projects/electron-app-mui
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies (builder)
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path-builder.outputs.dir }}
          key: ${{ runner.os }}-yarn-builder-${{ hashFiles('builder-projects/electron-app-mui/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-builder-

      - name: Install dependencies (builder)
        working-directory: builder-projects/electron-app-mui
        run: yarn install --immutable

      - name: Build electron app (macOS - 7z)
        working-directory: builder-projects/electron-app-mui
        shell: bash
        run: |
          # Build with electron-vite build
          yarn electron-vite build
          # We remove --dir to let it actually compress the archive
          yarn electron-builder --mac -c.mac.target=7z

      - name: Upload macOS builder artifact
        uses: actions/upload-artifact@v4
        with:
          name: builder-macos-7z
          # electron-builder names the output based on your package.json name
          path: builder-projects/electron-app-mui/dist/*.7z
          retention-days: 30
