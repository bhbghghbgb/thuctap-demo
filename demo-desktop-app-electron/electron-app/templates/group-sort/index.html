<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Sort Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { color: #3730a3; margin-bottom: 0.5rem; }
    .subtitle { color: #6366f1; margin-bottom: 2rem; font-size: 0.9rem; }

    .groups-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 900px;
    }

    .group-zone {
      flex: 1;
      min-width: 180px;
      max-width: 260px;
      background: white;
      border-radius: 1rem;
      padding: 1rem;
      box-shadow: 0 2px 12px rgba(99,102,241,0.1);
      border: 2px dashed #c7d2fe;
      min-height: 180px;
      transition: border-color 0.2s, background 0.2s;
    }
    .group-zone.drag-over {
      border-color: #6366f1;
      background: #eef2ff;
    }
    .group-zone h3 { color: #4f46e5; font-size: 0.95rem; margin-bottom: 0.75rem; }
    .group-zone img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-bottom: 0.5rem; display: block; }

    .items-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      max-width: 900px;
    }

    .item-card {
      background: white;
      border-radius: 0.75rem;
      padding: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: grab;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      user-select: none;
      border: 2px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      width: 110px;
    }
    .item-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .item-card img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; }
    .item-card span { font-size: 0.8rem; font-weight: 600; color: #374151; text-align: center; }
    .item-card.correct { border-color: #34d399; background: #ecfdf5; }
    .item-card.wrong { border-color: #f87171; background: #fef2f2; }

    .dropped-item { width: 80px; margin: 4px; }
    .dropped-item img { width: 48px; height: 48px; }
    .dropped-item span { font-size: 0.7rem; }

    #score-bar { margin-bottom: 1.5rem; font-size: 1rem; color: #4b5563; font-weight: 500; }
    #check-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #check-btn:hover { background: #4f46e5; }
    #result { margin-top: 1rem; font-size: 1.1rem; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Group Sort</h1>
  <p class="subtitle">Drag each card into the correct group!</p>
  <div id="score-bar"></div>
  <div class="groups-row" id="groups-container"></div>
  <div class="items-row" id="items-container"></div>
  <button id="check-btn" onclick="checkAnswers()">Check Answers ✓</button>
  <div id="result"></div>

  <script>
    // APP_DATA will be injected here by the builder tool:
    // window.APP_DATA = { groups: [...], items: [...] }

    const data = window.APP_DATA || { groups: [], items: [] }
    const placements = {} // itemId -> groupId

    function render() {
      const gc = document.getElementById('groups-container')
      const ic = document.getElementById('items-container')
      gc.innerHTML = ''
      ic.innerHTML = ''

      // Render groups
      data.groups.forEach(group => {
        const zone = document.createElement('div')
        zone.className = 'group-zone'
        zone.dataset.groupId = group.id

        if (group.imagePath) {
          const img = document.createElement('img')
          img.src = group.imagePath
          img.alt = group.name
          zone.appendChild(img)
        }

        const title = document.createElement('h3')
        title.textContent = group.name
        zone.appendChild(title)

        zone.addEventListener('dragover', e => {
          e.preventDefault()
          zone.classList.add('drag-over')
        })
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'))
        zone.addEventListener('drop', e => {
          e.preventDefault()
          zone.classList.remove('drag-over')
          const itemId = e.dataTransfer.getData('text/plain')
          dropItem(itemId, group.id, zone)
        })

        gc.appendChild(zone)
      })

      // Render items (shuffled)
      const shuffled = [...data.items].sort(() => Math.random() - 0.5)
      shuffled.forEach(item => {
        ic.appendChild(createItemCard(item, false))
      })

      updateScore()
    }

    function createItemCard(item, small) {
      const card = document.createElement('div')
      card.className = 'item-card' + (small ? ' dropped-item' : '')
      card.draggable = true
      card.dataset.itemId = item.id

      if (item.imagePath) {
        const img = document.createElement('img')
        img.src = item.imagePath
        img.alt = item.name
        card.appendChild(img)
      }

      const label = document.createElement('span')
      label.textContent = item.name
      card.appendChild(label)

      card.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', item.id)
      })
      return card
    }

    function dropItem(itemId, groupId, zone) {
      placements[itemId] = groupId
      const item = data.items.find(i => i.id === itemId)
      if (!item) return

      // Remove from items row if present
      const existing = document.querySelector(`[data-item-id="${itemId}"]`)
      if (existing) existing.remove()

      zone.appendChild(createItemCard(item, true))
      updateScore()
    }

    function updateScore() {
      const placed = Object.keys(placements).length
      document.getElementById('score-bar').textContent =
        `${placed} / ${data.items.length} placed`
    }

    function checkAnswers() {
      let correct = 0
      document.querySelectorAll('.item-card').forEach(card => {
        const itemId = card.dataset.itemId
        const item = data.items.find(i => i.id === itemId)
        if (!item) return
        const placed = placements[itemId]
        card.classList.remove('correct', 'wrong')
        if (placed === item.groupId) { card.classList.add('correct'); correct++ }
        else if (placed) card.classList.add('wrong')
      })
      const total = data.items.length
      const result = document.getElementById('result')
      result.textContent = `${correct} / ${total} correct! ${correct === total ? '🎉 Perfect!' : '🔄 Try again!'}`
      result.style.color = correct === total ? '#059669' : '#d97706'
    }

    render()
  </script>
</body>
</html>
